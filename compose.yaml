services:
  spellfire:
    build:
      context: .
      dockerfile: Dockerfile
    image: spellfire:latest
    # Build from source in this repo; never try to pull from a registry.
    # Komodo (and `docker compose pull`) would otherwise attempt a registry
    # pull of `spellfire:latest`, which does not exist remotely.
    pull_policy: build
    container_name: spellfire
    restart: unless-stopped
    # No host port published. The reverse proxy reaches the server over the
    # shared external `proxy` network at http://spellfire:8080.
    expose:
      - "8080"
    networks:
      - proxy
    environment:
      # Override any of these in a .env file next to this compose file.
      SPELLFIRE_ADDRESS: ":8080"
      SPELLFIRE_DATABASE: "/data/spellfire.db"
      SPELLFIRE_WEB_ROOT: "/app/web"
      SPELLFIRE_TICK_RATE: "${SPELLFIRE_TICK_RATE:-60}"
      SPELLFIRE_SEND_RATE: "${SPELLFIRE_SEND_RATE:-20}"
      SPELLFIRE_AOI_RADIUS: "${SPELLFIRE_AOI_RADIUS:-1200}"
      SPELLFIRE_MAX_REWIND_MS: "${SPELLFIRE_MAX_REWIND_MS:-200}"
    volumes:
      # Named volume keeps the SQLite account/character data across restarts.
      - spellfire-data:/data

networks:
  # Pre-existing network shared with the reverse proxy. Create it once with
  # `docker network create proxy` if it does not already exist.
  proxy:
    external: true

volumes:
  spellfire-data:

syntax = "proto3";

package spellfire.v1;

// WebSocket payloads are binary protobuf. The first field is the message kind,
// allowing both implementations to decode only the relevant payload fields.
message ClientEnvelope {
  enum Kind { UNKNOWN = 0; JOIN = 1; INPUT = 2; RESPAWN = 3; PING = 4; LOADOUT = 5; CRAFT = 6; }
  Kind kind = 1;
  string session_token = 2;
  string character_id = 3;
  Input input = 4;
  uint64 client_time_ms = 5;
  Loadout loadout = 6; // LOADOUT only: the requested equipped set
  CraftRequest craft = 7; // CRAFT only: the requested build
}

// One requested build: the weapon category and the component filling each slot.
// A slot the request omits is left stock, which is a legal choice.
message CraftRequest {
  string weapon = 1;
  repeated ComponentSlot components = 2;
}

message ComponentSlot {
  string slot = 1;
  string component = 2;
}

// A crafted weapon as it is owned: references only, never a stat snapshot, so a
// balance edit retunes it in place.
message CraftedItem {
  string id = 1;
  string weapon = 2;
  repeated ComponentSlot components = 3;
}

message MaterialStack {
  string material = 1;
  uint32 count = 2;
}

message Input {
  uint32 sequence = 1;
  uint32 buttons = 2; // UP=1, DOWN=2, LEFT=4, RIGHT=8, FIRE=16, DASH=32, RELOAD=64, INTERACT=128
  float aim_x = 3;
  float aim_y = 4;
  uint64 client_time_ms = 5;
  uint32 selected_slot = 6; // zero-based action-bar slot the use button acts through
}

// The equipped set. Both repeated fields are positional: entry n is slot n, and
// an empty slot travels as an empty string so a slot's index stays its binding.
message Loadout {
  string weapon = 1;
  repeated string gadgets = 2;
  repeated string spells = 3;
}

message ServerEnvelope {
  enum Kind { UNKNOWN = 0; WELCOME = 1; SNAPSHOT = 2; ERROR = 3; PONG = 4; LOADOUT = 5; PROGRESS = 6; CRAFT = 7; }
  Kind kind = 1;
  uint64 server_tick = 2;
  uint64 server_time_ms = 3;
  string player_id = 4;
  repeated Entity entities = 5;
  repeated CollisionObject colliders = 6;
  string error = 7; // on LOADOUT this is a rejection reason, not a terminal error
  uint64 echoed_client_time_ms = 8;
  Loadout loadout = 9;        // WELCOME and LOADOUT only, never on a snapshot
  bool loadout_editable = 10; // whether the set may be changed from where the body stands
  bool respec_owed = 11;      // a balance patch granted a free respec
  // The permanent character axis, on WELCOME and PROGRESS only. xp_to_next is
  // derived from the progression curve, not stored on the character.
  uint32 level = 12;
  uint64 xp = 13;
  uint64 xp_to_next = 14;
  repeated string unlocks = 15;
  // Owned crafted items and carried materials, on WELCOME and CRAFT only. Like
  // the loadout they change on a deliberate action inside safety, never twenty
  // times a second, so a snapshot never pays for them.
  repeated CraftedItem items = 16;
  repeated MaterialStack materials = 17;
}

message Entity {
  enum Type {
    UNKNOWN = 0;
    PLAYER = 1;
    PROJECTILE = 2;
    MOB = 3;
    DROP = 4;
    NODE = 5;
    TELEGRAPH = 6;
    DEPLOYABLE = 7;
    BOSS = 8;
    WORLD_ITEM = 9;
  }
  enum Allegiance {
    ALLEGIANCE_UNKNOWN = 0;
    SELF = 1;
    SQUAD = 2;
    NEUTRAL = 3;
    HOSTILE = 4;
  }
  enum TelegraphState {
    TELEGRAPH_NONE = 0;
    PENDING = 1;
    ACTIVE = 2;
    RESOLVED = 3;
  }
  Type type = 1;
  string id = 2;
  string name = 3;
  string class_name = 4;
  float x = 5;
  float y = 6;
  float vx = 7;
  float vy = 8;
  float aim_x = 9;
  float aim_y = 10;
  float health = 11;
  float max_health = 12;
  float mana = 13;
  uint32 acknowledged_input = 14;
  bool alive = 15;
  string owner_id = 16;
  string element = 17;
  string squad_id = 18;
  Allegiance allegiance = 19;
  TelegraphState telegraph_state = 20;
  bool invulnerable = 21;
  string telegraph_shape = 22;
  float radius = 23;
  float length = 24;
  float width = 25;
  float angle_degrees = 26;
  float telegraph_progress = 27;
  string ability_id = 28;
  bool lingering = 29;
  repeated string effect_ids = 30;
  float mass = 31; // -1 means immovable
}

message CollisionObject {
  string id = 1;
  float x = 2;
  float y = 3;
  float radius = 4;
  string kind = 5;
  string shape = 6;
  float width = 7;
  float height = 8;
  string entity_id = 9;
}
